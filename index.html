<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DXFs 3D</title>
  <link rel="stylesheet" href="./styles.css" />

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="topbar">
    <div class="left">
      <label class="btn">
        Importar DXF(s)
        <input id="fileInput" type="file" accept=".dxf,.DXF" multiple hidden />
      </label>
      <label class="btn">
        Importar STEP(s)
        <input id="stepInput" type="file" accept=".step,.stp,.STEP,.STP" multiple hidden />
      </label>

      <button id="fitBtn" type="button" class="btn secondary">Enquadrar (Fit)</button>
      <button id="clearBtn" type="button" class="btn danger">Limpar</button>
      <button id="newSheetBtn" type="button" class="btn secondary">Nova chapa</button>
      <button id="editSheetBtn" type="button" class="btn secondary">Editar chapa</button>
      <button id="moveToSheetBtn" type="button" class="btn secondary">Mover para chapa</button>
      <span id="sheetInfo" class="counter">Chapa: -</span>
      <span id="pieceCount" class="counter">Pecas: 0</span>
      <span id="batchTime" class="counter">Tempo: 0 ms</span>
      <span id="runtimeMode" class="counter">Render: GPU (WebGL)</span>
      <span id="cacheStats" class="counter">Cache: -</span>
      <span id="selectedPiece" class="counter">Peca sel.: -</span>
    </div>

  </div>

  <div id="workspace">
    <aside id="sheetDock">
      <div class="sheet-dock-head">
        <div class="sheet-dock-title">Chapas</div>
        <div class="sheet-dock-sub">Clique para ativar</div>
      </div>
      <div id="sheetList" class="sheet-list"></div>
    </aside>
    <div id="viewportWrap">
      <div id="viewport"></div>
    </div>
  </div>

  <div id="help">
    Mouse: <b>Esq</b> orbitar | <b>Meio</b> zoom | <b>Dir</b> pan | <b>Delete</b> remove peca
  </div>

  <div id="sheetEditModal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-title">Editar chapa ativa</div>
      <div class="modal-grid">
        <label class="field">Largura (mm)
          <input id="sheetW" type="number" min="10" step="1" value="3000" />
        </label>
        <label class="field">Altura (mm)
          <input id="sheetH" type="number" min="10" step="1" value="1200" />
        </label>
        <label class="field">Espessura (mm)
          <input id="sheetT" type="number" min="0.1" step="0.1" value="1" />
        </label>
        <label class="field">Espacamento (mm)
          <input id="sheetS" type="number" min="0" step="0.1" value="5" />
        </label>
        <label class="field">Margem superior (mm)
          <input id="sheetMT" type="number" min="0" step="0.1" value="10" />
        </label>
        <label class="field">Margem inferior (mm)
          <input id="sheetMB" type="number" min="0" step="0.1" value="10" />
        </label>
        <label class="field">Margem esquerda (mm)
          <input id="sheetML" type="number" min="0" step="0.1" value="10" />
        </label>
        <label class="field">Margem direita (mm)
          <input id="sheetMR" type="number" min="0" step="0.1" value="10" />
        </label>
      </div>
      <div class="modal-actions">
        <button id="applyAllSheetsBtn" type="button" class="btn secondary">Aplicar em todas</button>
        <button id="applySheetBtn" type="button" class="btn">Aplicar</button>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const editBtn = document.getElementById("editSheetBtn");
      const modal = document.getElementById("sheetEditModal");
      if (!editBtn || !modal) return;

      editBtn.addEventListener("click", () => {
        if (typeof window.__openSheetEditorModal === "function") {
          window.__openSheetEditorModal();
          return;
        }
        modal.classList.remove("hidden");
      });
    })();
  </script>

  <script type="module" src="./app.js?v=layoutSheets2-gpuonly-editfix7"></script>
</body>
</html>
